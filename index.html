<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSFX Sports</title>
<style>
body{margin:0;font-family:Arial;background:#000;color:white;}
.banner{text-align:center;padding:30px;background:#111;}
.productos{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;padding:15px;}
.card{background:#111;padding:10px;border-radius:10px;text-align:center;}
.card img{width:100%;border-radius:10px;}
button{background:#FF6A00;color:white;border:none;padding:8px;border-radius:6px;margin-top:5px;width:100%;}
.carrito{position:fixed;bottom:10px;right:10px;background:white;color:black;padding:10px;border-radius:10px;width:260px;max-height:300px;overflow:auto;}
.float-btn{position:fixed;right:15px;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:22px;text-decoration:none;}
.whatsapp{bottom:140px;background:#25D366;}
.instagram{bottom:80px;background:#E1306C;}
</style>
</head>
<body><div class="banner">
<h1>MSFX SPORTS</h1>
<p>Si no encuentras una playera, contáctanos por WhatsApp o Instagram</p>
</div><section class="productos"><div class="card">
<img src="https://raw.githubusercontent.com/ikersanty007-cell/MSFX_Sports/main/f1e652e3347e4faba1d44549abd8a0a0.jpg">
<h3>Portugal Local</h3>
<p>$450</p>
<button onclick="agregar('Portugal Local',450)">Agregar</button>
</div><div class="card">
<img src="https://raw.githubusercontent.com/ikersanty007-cell/MSFX_Sports/main/IMG-20260416-WA0002.jpg">
<h3>Pants Cruz Azul Local</h3>
<p>$1500</p>
<button onclick="agregar('Pants Cruz Azul Local',1500)">Agregar</button>
</div><div class="card">
<img src="https://raw.githubusercontent.com/ikersanty007-cell/MSFX_Sports/main/4a3a557ec72f4d858c5af485c650ed9b.jpg">
<h3>Gorra México</h3>
<p>$200</p>
<button onclick="agregar('Gorra México',200)">Agregar</button>
</div></section><div class="carrito">
<h4>Carrito</h4>
<div id="lista"></div>
<div>Total: $<span id="total">0</span></div>
<button onclick="comprar()">Comprar</button>
</div><a class="float-btn whatsapp" href="#" onclick="comprar()">💬</a> <a class="float-btn instagram" href="https://instagram.com/msfx_sports">📸</a>

<script>
let carrito=[];
let total=0;

function agregar(nombre,precio){
  carrito.push({nombre,precio});
  total+=precio;
  render();
}

function render(){
  let lista=document.getElementById('lista');
  lista.innerHTML='';
  carrito.forEach(p=>{
    let div=document.createElement('div');
    div.textContent=`${p.nombre} - $${p.precio}`;
    lista.appendChild(div);
  });
  document.getElementById('total').textContent=total;
}

function comprar(){
  if(carrito.length===0){alert('Agrega productos');return;}
  let msg='Hola quiero pedir:%0A';
  carrito.forEach(p=>{msg+=`- ${p.nombre} $${p.precio}%0A`;});
  msg+=`Total: $${total}`;
  window.open('https://instagram.com/msfx_sports');
}
</script></body>
</html>
